<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Galerie Interactive</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 20px; }
        h1 { color: #1a73e8; }
        
        /* Style de la galerie (petites vignettes) */
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        .gallery img { 
            width: 150px; height: 150px; object-fit: cover; /* Images carrées et petites */
            border-radius: 10px; cursor: pointer; transition: 0.3s; border: 3px solid white;
        }
        .gallery img:hover { transform: scale(1.1); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        /* Style du Plein Écran (Modal) */
        #modal { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; 
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); 
            justify-content: center; align-items: center; 
        }
        #modal img { max-width: 90%; max-height: 80%; border-radius: 5px; }
        
        /* Boutons de navigation */
        .nav-btn { 
            position: absolute; top: 50%; color: white; font-size: 50px; 
            font-weight: bold; cursor: pointer; user-select: none; padding: 20px;
            transform: translateY(-50%); text-decoration: none;
        }
        .nav-btn:hover { color: #1a73e8; }
        #prev { left: 10px; }
        #next { right: 10px; }
        #close { position: absolute; top: 20px; right: 30px; font-size: 40px; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Ma Galerie</h1>
    <p>Cliquez sur une photo pour l'agrandir</p>

    <div class="gallery">
        <img src="static/photo1.Jpeg" onclick="openModal(0)">
        <img src="static/photo2.jpeg" onclick="openModal(1)">
        <img src="static/photo3.jpeg" onclick="openModal(2)">
        <img src="static/photo4.jpeg" onclick="openModal(3)">
        <img src="static/photo5.jpeg" onclick="openModal(4)">
    </div>

    <div id="modal">
        <span id="close" onclick="closeModal()">&times;</span>
        <span id="prev" class="nav-btn" onclick="changeSlide(-1)">&#10094;</span>
        <img id="modal-img" src="">
        <span id="next" class="nav-btn" onclick="changeSlide(1)">&#10095;</span>
    </div>

    <script>
        let images = document.querySelectorAll('.gallery img');
        let currentIndex = 0;

        function openModal(index) {
            currentIndex = index;
            document.getElementById("modal").style.display = "flex";
            updateModal();
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }

        function changeSlide(n) {
            currentIndex += n;
            if (currentIndex >= images.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = images.length - 1;
            updateModal();
        }

        function updateModal() {
            document.getElementById("modal-img").src = images[currentIndex].src;
        }

        // Fermer si on clique à côté de l'image
        window.onclick = function(event) {
            if (event.target == document.getElementById("modal")) closeModal();
        }
    </script>
</body>
</html>
