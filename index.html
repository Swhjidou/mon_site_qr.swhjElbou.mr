<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Galerie Photo QR</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #f0f2f5; 
            margin: 0;
            padding: 20px;
        }
        h1 { color: #1a73e8; }
        .gallery { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
            margin-top: 30px; 
        }
        .gallery img { 
            width: 90%; 
            max-width: 400px; 
            border-radius: 15px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.1); 
            border: 5px solid white;
        }
    </style>
</head>
<body>

    <h1>Bienvenue sur ma galerie</h1>
    <p>Photos synchronisées via QR Code</p>

    <div class="gallery">
        <img src="static/photo1.PNG" alt="Photo 1">
        <!-- <img src="static/photo2.jpg" alt="Photo 2"> -->
        
        </div>

</body>
</html>
