<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Galerie QR</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; }
        h1 { color: #333; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; }
        .gallery img { 
            width: 300px; 
            border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); 
            transition: transform 0.2s;
        }
        .gallery img:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>Bienvenue sur ma galerie</h1>
    <p>Scanner pour voir mes photos</p>

    <div class="gallery">
        {% for photo in photos %}
            <img src="{{ url_for('static', filename=photo) }}" alt="Photo">
        {% endfor %}
    </div>
</body>
</html>
