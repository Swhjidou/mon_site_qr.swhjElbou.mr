<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Élève</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>
    <div id="contenu-page" style="display: none;">
        <h1>Espace Correction</h1>

        
        <div class="ribbon-container">
            <div class="ribbon">
                <!-- Button d'accueil -->
                <button class="tab-button active" onclick="ouvrirOnglet(event, 'accueil')">
                    <span class="class-number">🏠</span>
                    <span class="class-label">Accueil</span>
                </button>

                <!-- Button d'accueil -->
                <button class="tab-button" onclick="ouvrirOnglet(event, 'classe5')" style="display: none;">
                    <span class="class-label">Classe 5C/D</span>
                </button>
            </div>
        </div>

        <div id="accueil" class="tab-content" style="display: block;">
            <div class="welcome-card">
                <h3 id="messageBienvenue">
                    Bonjour dans la classe de 5 C&D ! 👋
                </h3>
                <p>
                    Sélectionnez <strong>Classe 5</strong> pour voir les corrections.
                </p>
                <ul class="instructions-list">
                    <li>Cliquez sur une classe ci-dessus.</li>
                    <li>Cliquez sur une image pour l'agrandir.</li>
                </ul>
        </div>
        
        <div id="classe5" class="tab-content">
            <h3>Correction - Classe 5</h3>
            <div class="gallery">
                <div class="image-container">                
                    <img src="static/photo1.jpeg" 
                        onclick="ouvrirPleinEcran(0, 'classe5')" 
                        data-id="classe5_img1">
                    <div class="view_counter" id="counter_classe5_img1">
                        0
                    </div>
                </div>
                <div class="image-container">                
                    <img src="static/photo2.jpeg" 
                        onclick="ouvrirPleinEcran(1, 'classe5')" 
                        data-id="classe5_img2">
                    <div class="view_counter" id="counter_classe5_img2">
                        0
                    </div>
                </div>
                <div class="image-container">                
                    <img src="static/photo3.jpeg" 
                        onclick="ouvrirPleinEcran(2, 'classe5')" 
                        data-id="classe5_img3">
                    <div class="view_counter" id="counter_classe5_img3">
                        0
                    </div>
                </div>
            </div>
        </div>

        <!-- Fenêtre modale pour agrandir les photos -->
        <div id="modele" class="modele" onclick="fermerPleinEcran()">
            <span class="fermer" onclick="fermerPleinEcran()">&times;</span>
            <img id="imageModele" class="modele-contenu">
            <div class="nav-droite" onclick="event.stopPropagation(); photoSuivante()">&#10095;</div>
            <div class="nav-gauche" onclick="event.stopPropagation(); photoPrecedente()">&#10094;</div>
        </div>
    </div>

    <div class="login-container" id="verrouillage"
            style="position:fixed; 
            top:0; 
            left:0; 
            width:100%; 
            height:100%; 
            background:#1a73e8; 
            z-index:9999; display:flex; 
            justify-content:center; 
            align-items:center; 
            color:white; 
            flex-direction:column; 
            font-family: 'Segoe UI', sans-serif;">
        <div style="background: rgba(255,255,255,0.1); 
            padding: 40px; 
            border-radius: 25px; 
            backdrop-filter: blur(10px); 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.2); 
            width: 80%; 
            max-width: 400px;">

            <div style="font-size: 50px; 
                margin-bottom: 10px;">🎓</div>
            <h2 style="margin-bottom: 5px;">Espace Élève</h2>
            <p style="margin-bottom: 25px; 
                opacity: 0.9;">Veuillez vous identifier</p>
            
            <input type="text" id="fullName" placeholder="Nom de Votre classe" 
                style="width: 100%; 
                padding:12px; 
                border-radius:15px; 
                border:none; 
                text-align:center; 
                font-size:1rem; 
                outline:none; 
                margin-bottom: 15px;">
            
            <input type="password" id="password" placeholder="Mot de passe" 
                style="width: 100%; 
                padding:12px; 
                border-radius:15px; 
                border:none; 
                text-align:center; 
                font-size:1rem; 
                outline:none; 
                margin-bottom: 20px;">
            
            <button onclick="seConnecter()" style="width: 100%; padding:12px; border-radius:15px; 
                border:none; background:white; color:#1a73e8; font-weight:bold; cursor:pointer; 
                font-size: 1rem; transition: 0.3s;">
                Se connecter
            </button>
            
            <p id="erreur-code" style="color:#ffcccb; margin-top:15px; display:none; 
                font-size: 0.9rem;">Nom ou mot de passe incorrect.</p>
        </div>



        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
    </div>

    <script>

        // Exemple d'identifiants valides (à modifier selon tes besoins)
        const identifiantsValides = [
            { nom: "Elbou", motDePasse: "1234" },
            { nom: "Swh Jidou", motDePasse: "5678" },
            { nom: "Ami", motDePasse: "admin123" }
        ];
        // --- LOGIQUE D'ACCÈS ---
        function seConnecter() {
            const nom = document.getElementById('fullName').value.trim();
            const motDePasse = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const verrouillage = document.getElementById('verrouillage');
            
        
            // On utilise .find() pour parcourir la liste
            // Vérifier les identifiants
            const utilisateurValide = identifiantsValides.find(
                user => user.nom === nom && user.motDePasse === motDePasse
            );

            if (utilisateurValide) {
                // Sauvegarder le nom de l'élève dans sessionStorage
                sessionStorage.setItem('user-name', nom);
                sessionStorage.setItem('user-class', 'classe5');
                sessionStorage.setItem('is-connected', 'true');
                // Afficher le contenu principal
                document.getElementById('contenu-page').style.display = 'block';
               // Cacher l'écran de verrouillage
                verrouillage.style.display = 'none';
                
                // Afficher le bouton Accueil
                const boutonAccueil = document.querySelector('.tab-button[onclick*="accueil"]');
                if (boutonAccueil) {
                    boutonAccueil.style.display = 'inline-flex';
                }
                // Afficher le bouton de la Classe 5
                const boutonClasse5 = document.querySelector('.tab-button[onclick*="classe5"]');
                if (boutonClasse5) {
                    boutonClasse5.style.display = 'inline-flex';
                }

                // Modifier le message de bienvenue
                const titreAccueil = document.getElementById('messageBienvenue');
                if (titreAccueil) {
                    titreAccueil.innerHTML = 'Bonjour dans classe de ' + nom + ' ! 👋';
                }

                // Petit message de bienvenue
                alert('Bienvenue mon éleve de ' + nom + ' !');

            } else {
                // Afficher l'erreur (dans le texte rouge prévu dans ta boîte)
                const erreurCode = document.getElementById('erreur-code');
                erreurCode.style.display = 'block';

                // On peut aussi utiliser ton autre div d'erreur si tu préfères
                errorDiv.textContent = 'Nom ou mot de passe incorrect.';
                errorDiv.style.display = 'block';    
            }
        }

        // Permettre de valider avec la touche Entrée
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                seConnecter();
            }
        });

        // ========== GALERIE PHOTO ==========
        let indexActuel = 0;
        let photosActuelles = [];
        const modele = document.getElementById("modele");
        const imageModele = document.getElementById("imageModele");

        function ouvrirPleinEcran(index, idOnglet) {
            // Récupérer toutes les images de la galerie de l'onglet
            photosActuelles = document.querySelectorAll('#' + idOnglet + ' .gallery img');
            indexActuel = index;

            // Afficher la modale
            modele.style.display = "flex";
            imageModele.src = photosActuelles[indexActuel].src;
        }

        function fermerPleinEcran() {
            modele.style.display = "none";
        }

        function photoSuivante() {
            if (photosActuelles.length === 0) return;
            indexActuel = (indexActuel + 1) % photosActuelles.length;
            imageModele.src = photosActuelles[indexActuel].src;
        }

        function photoPrecedente() {
            if (photosActuelles.length === 0) return;
            indexActuel = (indexActuel - 1 + photosActuelles.length) % photosActuelles.length;
            imageModele.src = photosActuelles[indexActuel].src;
        }

        // Navigation au clavier
        document.addEventListener('keydown', (e) => {
            if (modele && modele.style.display === "flex") {
                if (e.key === "ArrowRight") photoSuivante();
                if (e.key === "ArrowLeft") photoPrecedente();
                if (e.key === "Escape") fermerPleinEcran();
            }
        });

        // Vérifier si l'utilisateur est déjà connecté (après refresh de page)
        function verifierConnexionExistante() {
            if (sessionStorage.getItem('is-connected') === 'true') {
                const nom = sessionStorage.getItem('user-name');
                
                document.getElementById('contenu-page').style.display = 'block';
                document.getElementById('verrouillage').style.display = 'none';
                
                // Afficher le bouton Accueil
                const boutonAccueil = document.querySelector('.tab-button[onclick*="accueil"]');
                if (boutonAccueil) {
                    boutonAccueil.style.display = 'inline-flex';
                }
                // Afficher le bouton Classe 5
                const boutonClasse5 = document.querySelector('.tab-button[onclick*="classe5"]');
                if (boutonClasse5) {
                    boutonClasse5.style.display = 'inline-flex';
                }
                
                const titreAccueil = document.getElementById('messageBienvenue');
                if (titreAccueil) {
                    titreAccueil.innerHTML = 'Bonjour dans la classe ' + nom + ' ! 👋';
                }
            }
        }

        // Appeler cette fonction au chargement de la page
        window.onload = function() {
            verifierConnexionExistante();
            // Désactiver le clic droit sur les images
            document.addEventListener('contextmenu', function(e) {
                if (e.target.tagName === "IMG") {
                    e.preventDefault();
                }
            });
        }

        // --- GESTION DES ONGLETS ---
        function ouvrirOnglet(evt, nomOnglet) {
            
            // Récupérer tous les contenus d'onglets
            let tabContents = document.getElementsByClassName("tab-content");
            // Cacher tous les onglets
            for (let i = 0; i < tabContents.length; i++) {
                tabContents[i].style.display = "none";
            }

            // Récupérer tous les boutons d'onglets
            let tabButtons = document.getElementsByClassName("tab-button");
            // Enlever la classe "active" de tous les boutons
            for (let i = 0; i < tabButtons.length; i++) {
                tabButtons[i].classList.remove("active");
            }

            // Enlever la classe "active" de tous les boutons
            document.getElementById(nomOnglet).style.display = "block";


            // Ajouter la classe "active" au bouton cliqué
            if (evt && evt.currentTarget) {
                evt.currentTarget.classList.add("active");
            }
        }
    </script>
</body>
</html>
